name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:lts-trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Cache node_modules, dist, docs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dist
            docs
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      #- name: Build
      #  run: yarn docs

      - name: Lint
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: node:lts-trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      
      - name: Install system dependencies
        run: apt-get update && apt-get install -y libcurl4t64
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml

  test-docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Docker build test
        run: |
          docker build -t ${{ github.event.repository.name }} . --no-cache
          docker rmi ${{ github.event.repository.name }}

  test-helm:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run Lint
        run: helm lint ./helm

  test-run:
    runs-on: ubuntu-latest
    needs: test-docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Run test-run.sh
        run: bash ./scripts/test-run.sh

  validate:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: node:lts-trixie-slim
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run validation script
        run: |
          set +e
          bash ./validate.sh

  publish-docker-image:
    runs-on: ubuntu-latest
    needs: test-run
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - name: Extract package name
        id: pkg
        run: |
          echo "name=$(yq '.name' package.json)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      - name: Build image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ steps.pkg.outputs.name }}
          docker build -t $IMAGE_NAME:latest .

      - name: Push images
        env:
          REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ steps.pkg.outputs.name }}
          TAG=${GITHUB_REF#refs/tags/v}

          docker push $IMAGE_NAME:latest
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:$TAG

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${{ steps.pkg.outputs.name }}/visibility" \
            -d '{"visibility":"public"}'

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: test-run
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    environment: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract chart name
        id: pkg
        run: |
          echo "name=$(yq '.name' ./helm/Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Add helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: |
          helm dep up ./helm

      - name: Package chart
        run: |
          helm package ./helm \
            --version "${GITHUB_REF#refs/tags/v}" \
            --app-version "${GITHUB_REF#refs/tags/v}"

      - name: Push chart to GHCR
        run: |
          CHART_NAME="${{ steps.pkg.outputs.name }}"
          CHART_VERSION="${GITHUB_REF#refs/tags/v}"
          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Make chart public
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/helm/${{ steps.pkg.outputs.name }}/visibility" \
            -d '{"visibility":"public"}'
