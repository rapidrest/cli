apiVersion: v2
description: Installs [[project_name]] into a Kubernetes cluster
name: [[name]]
version: 1.0.0
dependencies:
[[#if hasMongoDB]]
- name: mongodb
  repository: "@bitnami"
  version: ~18.4.4
  condition: mongodb.create
  tags:
    - dbs
    - mongodb
  alias: mongodb
[[/if]]
[[#if hasRedis]]
- name: redis
  version: ~24.1.3
  repository: "@bitnami"
  condition: redis.create
  tags:
    - cache
    - redis
  alias: redis
[[/if]]
